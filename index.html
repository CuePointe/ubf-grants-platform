@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.ani{animation:fadeIn 0.25s ease forwards;}
.slide{animation:slideIn 0.2s ease forwards;}

const daysLeft=d=>d?Math.ceil((new Date(d)-new Date())/86400000):null;
const urgStyle=d=>{

  if(d<=60)return{bg:"#FFFDE7",col:"#F57F17",label:d+"d left"};

};

function Av({m,size=32}){return <div style={{width:size,height:size,borderRadius:8,background:m.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:size*0.32,flexShrink:0}}>{m.avatar}</div>;}
function Badge({children,bg,col,style={}}){return <span style={{padding:"2px 9px",borderRadius:20,background:bg,color:col,fontSize:11,fontWeight:600,display:"inline-block",...style}}>{children}</span>;}
function Notif({msg,type,onDone}){
  useEffect(()=>{const t=setTimeout(()=>onDone(),3200);return()=>clearTimeout(t);},[]);
  return <div className="slide" style={{position:"fixed",top:20,right:20,zIndex:9999,background:type==="err"?"#C62828":type==="warn"?"#E65100":"#1B5E20",color:"white",padding:"11px 18px",borderRadius:10,boxShadow:"0 8px 24px rgba(0,0,0,0.2)",fontSize:13,fontWeight:500}}>{msg}</div>;
}

// DASHBOARD
function Dashboard({grants,user,onView,onNav}){
  const urgent=grants.filter(g=>{const d=daysLeft(g.deadline);return d!==null&&d>=0&&d<=21;});
  const totalMax=grants.reduce((s,g)=>s+(g.highUsd||0),0);
  return(
    <div className="ani">
      <div style={{marginBottom:22}}>
        <h1 style={{fontSize:22,fontWeight:700,color:"#1B2E1B"}}>Welcome, {user.name.split(".")[1]?.trim()||user.name} 👋</h1>
        <p style={{color:"#666",marginTop:4,fontSize:12}}>Uganda Biodiversity Fund — Grants Intelligence Overview</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:22}}>
        {[
          {label:"Total Grants",value:grants.length,icon:"📋",col:"#1B5E20",bg:"#E8F5E9"},
          {label:"Funding Potential",value:fmtCur(totalMax)+"+",icon:"💰",col:"#0D47A1",bg:"#E3F2FD"},
          {label:"Urgent (≤21 days)",value:urgent.length,icon:"🔴",col:"#C62828",bg:"#FFEBEE"},
          {label:"Awarded",value:grants.filter(g=>g.status==="Awarded").length,icon:"✅",col:"#2E7D32",bg:"#E8F5E9"},
        ].map((k,i)=>(
          <div key={i} style={{background:"white",borderRadius:14,padding:"18px 20px",boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontSize:10,color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.6px",marginBottom:5}}>{k.label}</div>
                <div style={{fontSize:26,fontWeight:700,color:k.col}}>{k.value}</div>
              </div>
              <div style={{width:38,height:38,borderRadius:10,background:k.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>{k.icon}</div>
            </div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1.4fr 1fr",gap:16}}>
        <div style={{background:"white",borderRadius:14,padding:22,boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h2 style={{fontSize:14,fontWeight:600}}>⚠️ Urgent Deadlines</h2>
            <span style={{fontSize:11,color:"#888"}}>Next 21 days</span>
          </div>
          {grants.length===0?<div style={{color:"#888",fontSize:12,textAlign:"center",padding:"28px 0"}}>🌱 No grants yet — add your first grant to get started</div>
          :urgent.length===0?<div style={{color:"#888",fontSize:12,textAlign:"center",padding:"28px 0"}}>🎉 No urgent deadlines right now</div>
          :urgent.sort((a,b)=>new Date(a.deadline)-new Date(b.deadline)).map(g=>{
            const us=urgStyle(daysLeft(g.deadline));
            const bs=BATCHES[g.batch]||BATCHES[1];
            return(
              <div key={g.id} onClick={()=>onView(g)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid #F5F5F5",cursor:"pointer"}}>
                <Badge bg={us.bg} col={us.col}>{us.label}</Badge>

                  <div style={{fontSize:12,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.name}</div>
                  <div style={{fontSize:11,color:"#888"}}>{g.donor}</div>
                </div>
                <Badge bg={bs.bg} col={bs.color}>B{g.batch}</Badge>
              </div>
            );

          <h2 style={{fontSize:14,fontWeight:600,marginBottom:14}}>💰 Funding by Batch</h2>

            const bg=grants.filter(g=>g.batch===b);
            const mx=bg.reduce((s,g)=>s+(g.highUsd||0),0);
            const pct=totalMax>0?Math.round(mx/totalMax*100):0;
            const bs=BATCHES[b];
            return(
              <div key={b} style={{marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <span style={{fontSize:11,color:bs.color,fontWeight:500}}>{bs.label}</span>
                  <span style={{fontSize:11,color:"#666"}}>{bg.length} · {fmtCur(mx)}</span>
                </div>
                <div style={{height:7,background:"#F0F0F0",borderRadius:4,overflow:"hidden"}}>
                  <div style={{height:"100%",width:pct+"%",background:bs.color,borderRadius:4}}/>
                </div>
              </div>
            );
          })}
          <div style={{marginTop:14,padding:"12px 14px",background:"#E8F5E9",borderRadius:10}}>
            <div style={{fontSize:10,color:"#2E7D32",fontWeight:500,marginBottom:2}}>Total Maximum Potential</div>
            <div style={{fontSize:20,fontWeight:700,color:"#1B5E20"}}>{fmtCur(totalMax)}+</div>
          </div>
        </div>
      </div>
      {grants.length===0&&(
        <div style={{background:"white",borderRadius:14,padding:"48px 24px",textAlign:"center",boxShadow:"0 1px 6px rgba(0,0,0,0.06)",marginTop:16}}>
          <div style={{fontSize:44,marginBottom:14}}>🌱</div>
          <div style={{fontSize:15,fontWeight:600,color:"#1B2E1B",marginBottom:8}}>Your grants tracker is empty</div>
          <div style={{fontSize:13,color:"#666",marginBottom:20}}>Start by adding your first grant or ask the AI Agent to search for opportunities.</div>
          <button onClick={()=>onNav("grants")} style={{padding:"10px 24px",background:"#1B5E20",color:"white",border:"none",borderRadius:10,fontSize:13,fontWeight:500,cursor:"pointer"}}>+ Add First Grant</button>
        </div>
      )}
    </div>
  );
}

// TRACKER
function Tracker({grants,onAdd,onUpdate,onDelete}){
  const [view,setView]=useState("list");

            <div key={key} style={{display:"flex",flexDirection:"column"}}>

          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:22}}>
            {[["Deadline",fmtDate(g.deadline)],["Grant Size",g.size||"—"],["Geography",g.geo||"—"]].map(([l,v],i)=>(
              <div key={i} style={{padding:14,background:"#F8F9F8",borderRadius:10}}>
                <div style={{fontSize:10,color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:4}}>{l}</div>
                <div style={{fontSize:13,fontWeight:500,color:"#1B2E1B"}}>{v}</div>
              </div>

          {g.themes?.length>0&&(
            <div style={{marginBottom:20}}>
              <div style={{...FL,marginBottom:8}}>Thematic Areas</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:4}}>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:18}}>
            <div>
              <div style={{...FL,marginBottom:6}}>Status</div>
              <select value={g.status} onChange={e=>upd(g.id,{status:e.target.value})}>
                {STATUSES.map(s=><option key={s} value={s}>{s}</option>)}

            </div>
            <div>
              <div style={{...FL,marginBottom:6}}>Lead Person</div>
              <select value={g.assignee||""} onChange={e=>upd(g.id,{assignee:e.target.value})}>
                <option value="">Unassigned</option>

              </select>
            </div>
          </div>
          <div style={{marginBottom:20}}>
            <div style={{...FL,marginBottom:6}}>Notes / Action Items</div>
            <textarea defaultValue={g.notes} onBlur={e=>upd(g.id,{notes:e.target.value})} rows={3} placeholder="Add notes..."/>
          </div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {g.link&&<a href={g.link} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:6,padding:"9px 18px",background:"#1B5E20",color:"white",borderRadius:9,textDecoration:"none",fontSize:13,fontWeight:500}}>🔗 Open Official Grant Page</a>}
            {delC===g.id?(
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:12,color:"#C62828"}}>Are you sure?</span>
                <button onClick={()=>{onDelete(g.id);setDelC(null);setView("list");}} style={{...pBtn,background:"#C62828"}}>Yes, Delete</button>
                <button onClick={()=>setDelC(null)} style={gBtn}>Cancel</button>
              </div>
            ):<button onClick={()=>setDelC(g.id)} style={{...gBtn,color:"#C62828",borderColor:"#FFCDD2"}}>🗑 Delete</button>}
          </div>
        </div>
      </div>
    );
  }

  return(
    <div className="ani">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h1 style={{fontSize:20,fontWeight:700,color:"#1B2E1B"}}>📋 Grant Tracker</h1>
        <button onClick={()=>setView("add")} style={pBtn}>+ Add Grant</button>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <input value={srch} onChange={e=>setSrch(e.target.value)} placeholder="🔍 Search grants..." style={{width:200}}/>
        <select value={fb} onChange={e=>setFb(e.target.value)} style={{width:"auto"}}>

            <span>Grant</span><span>Deadline</span><span>Batch</span><span>Status</span><span>Lead</span><span></span>
          </div>
          {f.map(g=>{

            const asgn=TEAM.find(t=>t.email===g.assignee);
            return(
              <div key={g.id} style={{display:"grid",gridTemplateColumns:"2fr 100px 100px 120px 100px 70px",gap:8,padding:"11px 18px",borderBottom:"1px solid #FAFAFA",alignItems:"center",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="#FAFAFA"} onMouseLeave={e=>e.currentTarget.style.background="white"}>
                <div>
                  <div style={{fontSize:12,fontWeight:500,color:"#1B2E1B",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.name}</div>

                <Badge bg={us.bg} col={us.col}>{us.label}</Badge>
                <Badge bg={bs.bg} col={bs.color}>B{g.batch}</Badge>
                <Badge bg={ss.bg} col={ss.col}>{g.status}</Badge>
                <div>{asgn?<div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:22,height:22,borderRadius:6,background:asgn.color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:9,fontWeight:700}}>{asgn.avatar}</div><span style={{fontSize:10,color:"#555"}}>{asgn.name}</span></div>:<span style={{fontSize:10,color:"#CCC"}}>—</span>}</div>
                <button onClick={()=>{setSel(g);setView("detail");}} style={{fontSize:11,padding:"5px 10px",background:"#E8F5E9",border:"none",borderRadius:7,color:"#2E7D32",cursor:"pointer",fontWeight:500}}>View →</button>
              </div>

      )}

  );

// AI AGENT
function Agent({grants,user}){
  const [msgs,setMsgs]=useState([]);
  const [q,setQ]=useState("");
  const [loading,setLoading]=useState(false);
  const [stream,setStream]=useState("");
  const ref=useRef(null);
  useEffect(()=>{ref.current?.scrollIntoView({behavior:"smooth"});},[msgs,stream]);
  const send=async()=>{
    if(!q.trim()||loading)return;
    const qv=q;setQ("");
    setMsgs(p=>[...p,{role:"user",content:qv,ts:new Date().toISOString()}]);
    setLoading(true);setStream("");
    const ctx=grants.length>0?"CURRENT GRANTS ("+grants.length+" total):\n"+grants.map(g=>"- "+g.name+" | "+g.deadline+" | Batch "+g.batch+" | "+g.status).join("\n"):"No grants in system yet.";
    let full="";
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,stream:true,system:AGENT_PROMPT,messages:[{role:"user",content:ctx+"\n\nUser: "+qv}]})});
      const reader=res.body.getReader();const dec=new TextDecoder();let buf="";
      while(true){const{done,value}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});const lines=buf.split("\n");buf=lines.pop();
        for(const l of lines){if(!l.startsWith("data: "))continue;const d=l.slice(6);if(d==="[DONE]")continue;try{const p=JSON.parse(d);if(p.type==="content_block_delta"&&p.delta?.text){full+=p.delta.text;setStream(full);}}catch(_){}}}
      setMsgs(p=>[...p,{role:"assistant",content:full||"No response received.",ts:new Date().toISOString()}]);
    }catch(e){setMsgs(p=>[...p,{role:"assistant",content:"⚠️ Connection error. Check internet and try again.",ts:new Date().toISOString()}]);}
    setStream("");setLoading(false);
  };
  const prompts=["Search for new biodiversity grants in Uganda","Which grants should we prioritise this week?","Find grants for Forest Restoration in the Albertine Rift","Who should lead the EU/AICS application?","Find Batch 3 ($1M+) conservation grants for Africa"];
  return(
    <div className="ani" style={{display:"flex",flexDirection:"column",height:"calc(100vh - 80px)"}}>
      <div style={{marginBottom:14}}>
        <h1 style={{fontSize:20,fontWeight:700,color:"#1B2E1B"}}>🤖 UBF AI Grants Agent</h1>
        <p style={{color:"#666",marginTop:4,fontSize:12}}>Ask the agent to find grants, analyse opportunities, or advise on applications. Knows UBF priorities and your team.</p>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:14}}>
        {prompts.map(p=><button key={p} onClick={()=>setQ(p)} style={{padding:"6px 12px",background:"white",border:"1.5px solid #C8E6C9",borderRadius:20,fontSize:11,color:"#2E7D32",cursor:"pointer",fontWeight:500}}>{p}</button>)}
      </div>
      <div style={{flex:1,background:"white",borderRadius:14,boxShadow:"0 1px 6px rgba(0,0,0,0.06)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{flex:1,overflowY:"auto",padding:20}}>
          {msgs.length===0&&!loading&&(
            <div style={{textAlign:"center",padding:"60px 20px",color:"#888"}}>
              <div style={{fontSize:44,marginBottom:14}}>🌿</div>
              <div style={{fontSize:15,fontWeight:600,color:"#555",marginBottom:8}}>UBF Grants Intelligence Agent</div>
              <div style={{fontSize:12,lineHeight:1.7}}>I know UBF's BFP V4 priorities, 45 Key Biodiversity Areas,<br/>5 Program Windows, and your team roles.<br/>Ask me anything in plain English.</div>
            </div>
          )}
          {msgs.map((m,i)=>(
            <div key={i} style={{marginBottom:18,display:"flex",gap:10,flexDirection:m.role==="user"?"row-reverse":"row"}}>
              <div style={{width:32,height:32,borderRadius:9,flexShrink:0,background:m.role==="user"?user.color:"#1B5E20",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:m.role==="user"?11:16,fontWeight:700}}>
                {m.role==="user"?user.avatar:"🌿"}
              </div>
              <div style={{maxWidth:"78%",padding:"11px 15px",borderRadius:m.role==="user"?"14px 4px 14px 14px":"4px 14px 14px 14px",background:m.role==="user"?user.color:"#F8F9F8",color:m.role==="user"?"white":"#1B2E1B",fontSize:13,lineHeight:1.65,whiteSpace:"pre-wrap"}}>
                {m.content}
              </div>
            </div>
          ))}
          {loading&&(
            <div style={{display:"flex",gap:10}}>
              <div style={{width:32,height:32,borderRadius:9,background:"#1B5E20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>🌿</div>
              <div style={{maxWidth:"78%",padding:"11px 15px",borderRadius:"4px 14px 14px 14px",background:"#F8F9F8",fontSize:13,lineHeight:1.65,whiteSpace:"pre-wrap",color:"#1B2E1B"}}>
                {stream||<span style={{color:"#888",animation:"pulse 1.5s ease infinite"}}>Searching and analysing...</span>}
              </div>
            </div>
          )}
          <div ref={ref}/>
        </div>
        <div style={{borderTop:"1px solid #F0F0F0",padding:"13px 18px",display:"flex",gap:10}}>
          <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Ask the agent anything about grants or UBF priorities..."/>
          <button onClick={send} disabled={loading||!q.trim()} style={{padding:"9px 22px",background:loading||!q.trim()?"#E0E0E0":"#1B5E20",color:loading||!q.trim()?"#888":"white",border:"none",borderRadius:9,fontSize:13,fontWeight:500,cursor:loading||!q.trim()?"not-allowed":"pointer",whiteSpace:"nowrap"}}>
            {loading?"...":"Send →"}
          </button>
        </div>
      </div>
    </div>
  );
}

// PIPELINE
function Pipeline({grants,onView}){
  const groups=[
    {label:"This Week",f:g=>{const d=daysLeft(g.deadline);return d!==null&&d>=0&&d<=7;}},
    {label:"This Month",f:g=>{const d=daysLeft(g.deadline);return d!==null&&d>7&&d<=30;}},
    {label:"Next 3 Months",f:g=>{const d=daysLeft(g.deadline);return d!==null&&d>30&&d<=90;}},
    {label:"Later",f:g=>{const d=daysLeft(g.deadline);return d!==null&&d>90;}},
    {label:"Rolling / No Deadline",f:g=>daysLeft(g.deadline)===null},
  ];
  return(
    <div className="ani">
      <h1 style={{fontSize:20,fontWeight:700,color:"#1B2E1B",marginBottom:4}}>📅 Pipeline Calendar</h1>
      <p style={{color:"#666",fontSize:12,marginBottom:22}}>{grants.length} grants organised by deadline urgency</p>
      {grants.length===0&&<div style={{background:"white",borderRadius:14,padding:"56px 24px",textAlign:"center",boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}><div style={{fontSize:40,marginBottom:14}}>📅</div><div style={{fontSize:15,fontWeight:600}}>No grants in pipeline yet</div></div>}
      {groups.map(group=>{
        const gp=grants.filter(group.f);
        if(gp.length===0)return null;
        return(
          <div key={group.label} style={{marginBottom:24}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
              <span style={{fontSize:12,fontWeight:600,color:"#888",textTransform:"uppercase",letterSpacing:"0.6px",whiteSpace:"nowrap"}}>{group.label}</span>
              <div style={{flex:1,height:"1px",background:"#E8E8E8"}}/>
              <span style={{fontSize:11,color:"#888",whiteSpace:"nowrap"}}>{gp.length} grant{gp.length>1?"s":""}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:12}}>
              {gp.sort((a,b)=>{const da=daysLeft(a.deadline),db=daysLeft(b.deadline);if(da===null&&db===null)return 0;if(da===null)return 1;if(db===null)return -1;return da-db;}).map(g=>{
                const us=urgStyle(daysLeft(g.deadline));
                const bs=BATCHES[g.batch]||BATCHES[1];
                return(
                  <div key={g.id} onClick={()=>onView(g)} style={{background:"white",borderRadius:12,padding:"16px 18px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",borderLeft:"4px solid "+bs.color,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 14px rgba(0,0,0,0.1)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="0 1px 4px rgba(0,0,0,0.06)"}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                      <Badge bg={us.bg} col={us.col}>{us.label}</Badge>
                      <Badge bg={bs.bg} col={bs.color}>B{g.batch}</Badge>
                    </div>
                    <div style={{fontSize:13,fontWeight:600,color:"#1B2E1B",lineHeight:1.35,marginBottom:5}}>{g.name}</div>
                    <div style={{fontSize:11,color:"#888",marginBottom:4}}>{g.donor}</div>
                    <div style={{fontSize:11,color:"#555",fontWeight:500}}>{g.size}</div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// TEAM
function Team({grants}){
  return(
    <div className="ani">
      <h1 style={{fontSize:20,fontWeight:700,color:"#1B2E1B",marginBottom:20}}>👥 Grants Team</h1>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:14,marginBottom:22}}>
        {TEAM.map(m=>{
          const asgd=grants.filter(g=>g.assignee===m.email);
          const urg=asgd.filter(g=>{const d=daysLeft(g.deadline);return d!==null&&d>=0&&d<=21;});
          return(
            <div key={m.id} style={{background:"white",borderRadius:14,padding:20,boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                <Av m={m} size={46}/>
                <div><div style={{fontSize:14,fontWeight:600,color:"#1B2E1B"}}>{m.name}</div><div style={{fontSize:11,color:"#888"}}>{m.role}</div></div>
              </div>
              <div style={{fontSize:10,color:"#AAA",marginBottom:10,wordBreak:"break-all"}}>{m.email}</div>
              <div style={{display:"flex",gap:8}}>
                <div style={{flex:1,padding:"10px",background:"#F8F9F8",borderRadius:8,textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:700,color:"#1B5E20"}}>{asgd.length}</div>
                  <div style={{fontSize:10,color:"#888"}}>Assigned</div>
                </div>
                <div style={{flex:1,padding:"10px",background:urg.length>0?"#FFEBEE":"#F8F9F8",borderRadius:8,textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:700,color:urg.length>0?"#C62828":"#888"}}>{urg.length}</div>
                  <div style={{fontSize:10,color:urg.length>0?"#C62828":"#888"}}>Urgent</div>
                </div>
              </div>
              {asgd.length>0&&<div style={{marginTop:10}}>{asgd.slice(0,3).map(g=>{const bs=BATCHES[g.batch]||BATCHES[1];return(<div key={g.id} style={{fontSize:10,color:"#666",padding:"4px 0",borderTop:"1px solid #F5F5F5",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.name}</span><Badge bg={bs.bg} col={bs.color} style={{fontSize:9}}>B{g.batch}</Badge></div>);})}
              {asgd.length>3&&<div style={{fontSize:10,color:"#AAA",marginTop:4}}>+{asgd.length-3} more</div>}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// USER GUIDE
function Guide(){
  const [active,setActive]=useState(0);
  const sections=[
    {icon:"👋",title:"Welcome",color:"#1B5E20",bg:"#E8F5E9",content:[
      {type:"text",v:"This platform helps UBF track, manage and find grant opportunities — all in one place. No technical skills needed. This guide walks you through everything."},
      {type:"tip",v:"💡 Think of this as a smart noticeboard for grants. It shows what is available, when deadlines are, who is working on what, and can search for new grants automatically."},
    ]},
    {icon:"🔐",title:"How to Sign In",color:"#0D47A1",bg:"#E3F2FD",content:[
      {type:"text",v:"When you open the platform, you will see a sign-in screen with all team member names. Simply click your own name to enter."},
      {type:"steps",v:["Open the platform link in Chrome or Firefox","You will see the UBF logo and a list of names","Click your name — e.g. click P. Musiime if you are the Programs Officer","You are now signed in and will see your dashboard","To switch user, click Switch User at the bottom of the left menu"]},
      {type:"tip",v:"💡 No password required. Your name determines what you can see and do."},
    ]},
    {icon:"📊",title:"The Dashboard",color:"#1B5E20",bg:"#E8F5E9",content:[
      {type:"text",v:"The Dashboard is the first page after signing in. It shows a quick overview of everything important."},
      {type:"steps",v:["The four boxes at top show total grants, funding potential, urgent deadlines, awarded grants","Urgent Deadlines shows grants closing within 21 days — action needed immediately","Funding by Batch shows how much money is available across small, medium and large grants","Click any urgent grant to open its full details"]},
      {type:"explain",title:"What do Batch colours mean?",v:"🟡 Batch 1 (Gold) = $1,000 to $100,000 — smaller grants, faster to apply\n🔵 Batch 2 (Blue) = $100,001 to $1,000,000 — medium grants\n🟢 Batch 3 (Green) = Over $1,000,000 — large strategic grants"},
    ]},
    {icon:"📋",title:"Grant Tracker",color:"#4A148C",bg:"#F3E5F5",content:[

      {type:"steps",v:["Click Grant Tracker in the left menu","You will see a table of all grants with deadline, batch, status and lead person","Use the search box to find a grant by name or donor","Click View on any row to open full details","In detail view, update the status, assign a lead person, and add notes","Changes save automatically"]},
      {type:"explain",title:"Status meanings",v:"Not Started — you know about it but have not begun\nIn Progress — someone is working on the application\nDocuments Gathering — collecting required documents\nUnder Review — being reviewed internally\nSubmitted — sent to the donor\nAwarded — approved and awarded 🎉\nRejected — not successful this time"},

    {icon:"🤖",title:"AI Grants Agent",color:"#1B5E20",bg:"#E8F5E9",content:[
      {type:"text",v:"The AI Agent is like a grants researcher available 24 hours a day. Ask questions in plain English and get helpful answers based on UBF priorities."},
      {type:"steps",v:["Click AI Agent in the left menu","Type your question in the box at the bottom and press Enter","The agent responds with information and recommendations","Click any quick prompt button to get started immediately"]},
      {type:"explain",title:"What can you ask?",v:"Find grants: Search for new biodiversity grants in Uganda\nGet advice: Which grants should we apply for this month?\nAsk roles: Who should lead the EU application?\nGet strategic advice: What grants are available for Karamoja?"},
      {type:"warning",v:"⚠️ The agent needs internet to work. If you see an error, check your connection and try again."},
    ]},
    {icon:"📅",title:"Pipeline Calendar",color:"#E65100",bg:"#FFF3E0",content:[
      {type:"text",v:"The Pipeline Calendar organises all grants by how soon their deadlines are. See at a glance what needs urgent attention."},
      {type:"steps",v:["Click Pipeline in the left menu","Grants are grouped: This Week, This Month, Next 3 Months, Later","Red badges need immediate action","Click any grant card to open its full details"]},
      {type:"explain",title:"Deadline badge colours",v:"🔴 Red = Closes within 7 days — URGENT\n🟠 Orange = Closes within 21 days — Begin now\n🟡 Yellow = Closes within 60 days — Start planning\n🟢 Green = More than 60 days — Monitor and plan"},
    ]},
    {icon:"💡",title:"Top Tips",color:"#F57F17",bg:"#FFFDE7",content:[
      {type:"list",v:["Check Dashboard every Monday morning for urgent deadlines","When you receive a grant email, add it to the tracker immediately","Always fill in the Link to the Call when adding a grant","Assign a Lead Person to every grant as soon as you add it","Use the AI Agent before searching the internet for grants","Update grant status regularly so the whole team knows what is happening","Use the notes field for eligibility requirements, key contacts, watch-outs","Platform works best on laptop or desktop, but also works on smartphone"]},

    {icon:"🛠️",title:"Troubleshooting",color:"#C62828",bg:"#FFEBEE",content:[
      {type:"qa",v:[
        {q:"Tracker looks empty",a:"The platform stores data in your browser. Use the same browser and device each time. Ask T. Otieno for help."},
        {q:"AI Agent shows connection error",a:"Check your internet connection and try again. The agent needs stable internet."},
        {q:"I made a mistake in a grant",a:"Open the grant, click View, and update the notes, status or assignee. To fix name or donor, delete the grant and add again."},
        {q:"Who do I contact for help?",a:"Contact T. Otieno at t.otieno@biodiversityfund.org for any platform questions."},

    ]},
  ];
  const s=sections[active];
  return(
    <div className="ani" style={{display:"flex",gap:20,minHeight:"80vh"}}>
      <div style={{width:200,flexShrink:0}}>
        <div style={{background:"white",borderRadius:14,padding:14,boxShadow:"0 1px 6px rgba(0,0,0,0.06)",position:"sticky",top:20}}>
          <div style={{fontSize:11,fontWeight:600,color:"#888",textTransform:"uppercase",letterSpacing:"0.6px",marginBottom:10}}>Contents</div>
          {sections.map((sc,i)=>(
            <button key={i} onClick={()=>setActive(i)} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"9px 10px",border:"none",borderRadius:8,background:active===i?sc.bg:"transparent",color:active===i?sc.color:"#555",cursor:"pointer",fontSize:12,fontWeight:active===i?600:400,textAlign:"left",marginBottom:2,borderLeft:active===i?"3px solid "+sc.color:"3px solid transparent"}}>
              <span>{sc.icon}</span><span>{sc.title}</span>

          ))}

      <div style={{flex:1}}>

            <h2 style={{fontSize:20,fontWeight:700,color:s.color,margin:0}}>{s.title}</h2>

          {s.content.map((b,i)=>{
            if(b.type==="text")return <p key={i} style={{fontSize:14,color:"#333",lineHeight:1.75,marginBottom:20}}>{b.v}</p>;
            if(b.type==="tip")return <div key={i} style={{padding:"14px 18px",background:"#E8F5E9",borderRadius:10,border:"1px solid #C8E6C9",marginBottom:20}}><p style={{fontSize:13,color:"#2E7D32",lineHeight:1.7,margin:0}}>{b.v}</p></div>;
            if(b.type==="warning")return <div key={i} style={{padding:"14px 18px",background:"#FFF3E0",borderRadius:10,border:"1px solid #FFE0B2",marginBottom:20}}><p style={{fontSize:13,color:"#E65100",lineHeight:1.7,margin:0}}>{b.v}</p></div>;
            if(b.type==="steps")return <div key={i} style={{marginBottom:24}}><div style={{fontSize:12,fontWeight:600,color:"#888",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:12}}>Step by Step</div>{b.v.map((step,j)=><div key={j} style={{display:"flex",gap:12,marginBottom:10,alignItems:"flex-start"}}><div style={{width:26,height:26,borderRadius:"50%",background:s.color,color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>{j+1}</div><p style={{fontSize:13,color:"#333",lineHeight:1.65,margin:0}}>{step}</p></div>)}</div>;
            if(b.type==="explain")return <div key={i} style={{padding:"16px 20px",background:s.bg,borderRadius:10,marginBottom:20,borderLeft:"4px solid "+s.color}}><div style={{fontSize:12,fontWeight:700,color:s.color,marginBottom:8}}>{b.title}</div><p style={{fontSize:13,color:"#333",lineHeight:1.75,margin:0,whiteSpace:"pre-line"}}>{b.v}</p></div>;
            if(b.type==="list")return <div key={i} style={{marginBottom:20}}>{b.v.map((item,j)=><div key={j} style={{display:"flex",gap:10,marginBottom:10,alignItems:"flex-start"}}><span style={{color:s.color,fontSize:16,flexShrink:0}}>✓</span><p style={{fontSize:13,color:"#333",lineHeight:1.65,margin:0}}>{item}</p></div>)}</div>;
            if(b.type==="qa")return <div key={i}>{b.v.map((item,j)=><div key={j} style={{marginBottom:16,padding:"16px 20px",background:"#FAFAFA",borderRadius:10,border:"1px solid #F0F0F0"}}><div style={{fontSize:13,fontWeight:600,color:"#C62828",marginBottom:8}}>❓ {item.q}</div><div style={{fontSize:13,color:"#333",lineHeight:1.7}}>{item.a}</div></div>)}</div>;

          <div style={{display:"flex",justifyContent:"space-between",marginTop:28,paddingTop:20,borderTop:"1px solid #F0F0F0"}}>

// MAIN APP
function App(){
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState("dashboard");
  const [grants,setGrants]=useState(()=>{try{const r=localStorage.getItem("ubf_grants_v1");return r?JSON.parse(r):[];}catch{return [];}});
  const [notif,setNotif]=useState(null);
  const [viewGrant,setViewGrant]=useState(null);

  const save=g=>{try{localStorage.setItem("ubf_grants_v1",JSON.stringify(g));}catch{}};
  const notify=(msg,type="ok")=>setNotif({msg,type,k:Date.now()});

  const addGrant=d=>{const g={id:genId(),batch:clsBatch(d.highUsd),status:"Not Started",assignee:null,notes:"",createdAt:new Date().toISOString(),...d};setGrants(p=>{const n=[g,...p];save(n);return n;});notify("Grant added!");};
  const updateGrant=(id,p)=>setGrants(prev=>{const n=prev.map(g=>g.id===id?{...g,...p}:g);save(n);return n;});
  const deleteGrant=id=>setGrants(prev=>{const n=prev.filter(g=>g.id!==id);save(n);return n;});

  const urgent=grants.filter(g=>{const d=daysLeft(g.deadline);return d!==null&&d>=0&&d<=21;});

  if(!user)return(<><Login onLogin={u=>{setUser(u);notify("Welcome, "+(u.name.split(".")[1]?.trim()||u.name)+"! 👋");}}/>{notif&&<Notif key={notif.k} msg={notif.msg} type={notif.type} onDone={()=>setNotif(null)}/>}</>);

  const NAV=[{id:"dashboard",icon:"📊",label:"Dashboard"},{id:"grants",icon:"📋",label:"Grant Tracker"},{id:"agent",icon:"🤖",label:"AI Agent"},{id:"pipeline",icon:"📅",label:"Pipeline"},{id:"team",icon:"👥",label:"Team"},{id:"guide",icon:"📖",label:"User Guide"}];

  return(
    <div style={{display:"flex",minHeight:"100vh"}}>
      <div style={{position:"fixed",left:0,top:0,bottom:0,width:220,background:"#0F1F10",display:"flex",flexDirection:"column",zIndex:100}}>
        <div style={{padding:"18px 18px 14px",borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
          <img src={LOGO} alt="UBF Logo" style={{width:"100%",maxHeight:75,objectFit:"contain",filter:"brightness(0) invert(1)",opacity:0.92}}/>
        </div>
        <nav style={{flex:1,padding:"10px 0",overflowY:"auto"}}>
          {NAV.map(item=>{
            const isA=tab===item.id;
            return(
              <button key={item.id} onClick={()=>{setTab(item.id);setViewGrant(null);}} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"10px 18px",background:isA?"rgba(255,255,255,0.1)":"transparent",border:"none",borderLeft:isA?"3px solid #66BB6A":"3px solid transparent",color:isA?"white":"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:13,fontWeight:isA?600:400,textAlign:"left",position:"relative"}}>
                <span style={{fontSize:15}}>{item.icon}</span>
                <span>{item.label}</span>
                {item.id==="dashboard"&&urgent.length>0&&<span style={{marginLeft:"auto",background:"#C62828",color:"white",borderRadius:10,fontSize:10,fontWeight:700,padding:"1px 6px"}}>{urgent.length}</span>}
              </button>
            );
          })}
        </nav>
        <div style={{padding:"14px 18px",borderTop:"1px solid rgba(255,255,255,0.08)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <div style={{width:34,height:34,borderRadius:9,background:user.color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:12,flexShrink:0}}>{user.avatar}</div>
            <div style={{minWidth:0}}>
              <div style={{color:"white",fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.name}</div>
              <div style={{color:"rgba(255,255,255,0.4)",fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.role}</div>
            </div>
          </div>
          <button onClick={()=>{setUser(null);setTab("dashboard");}} style={{width:"100%",padding:"7px",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"rgba(255,255,255,0.45)",cursor:"pointer",fontSize:11}}>Switch User</button>
        </div>
      </div>
      <main style={{marginLeft:220,flex:1,padding:"28px 32px",minHeight:"100vh",background:"#F0F4F0"}}>
        {tab==="dashboard"&&<Dashboard grants={grants} user={user} onView={g=>{setViewGrant(g);setTab("grants");}} onNav={setTab}/>}
        {tab==="grants"&&<Tracker grants={grants} onAdd={addGrant} onUpdate={updateGrant} onDelete={deleteGrant}/>}
        {tab==="agent"&&<Agent grants={grants} user={user}/>}
        {tab==="pipeline"&&<Pipeline grants={grants} onView={g=>{setViewGrant(g);setTab("grants");}}/>}
        {tab==="team"&&<Team grants={grants}/>}
        {tab==="guide"&&<Guide/>}
      </main>
      {notif&&<Notif key={notif.k} msg={notif.msg} type={notif.type} onDone={()=>setNotif(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
